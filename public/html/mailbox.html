<!doctype html>
<html lang="vi" class="precheck-hide">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hộp thư của tôi - Email tạm thời iDing</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      .precheck-hide body {
        visibility: hidden !important;
      }
    </style>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="stylesheet" href="/css/mailbox.css" />
    <script src="/js/auth-guard.js" defer></script>
    <script>
      // 访问邮箱页先做前端快速鉴权，仅允许 mailbox 角色
      (function () {
        fetch("/api/session", { headers: { "Cache-Control": "no-cache" } })
          .then((r) => (r.ok ? r.json() : Promise.reject("unauth")))
          .then((s) => {
            if (s && s.role === "mailbox") {
              try {
                document.documentElement.classList.remove("precheck-hide");
              } catch (_) {}
              return;
            }
            // 其他角色：回首页
            location.replace("/");
          })
          .catch(() => {
            // 未登录：进入加载页做鉴权
            if (window.AuthGuard) {
              window.AuthGuard.goLoading("/html/mailbox.html", "Đang xác minh quyền…");
            } else {
              location.replace(
                "/templates/loading.html?redirect=%2Fhtml%2Fmailbox.html&status=" +
                  encodeURIComponent("Đang xác minh quyền…"),
              );
            }
          });
      })();
    </script>
  </head>
  <body>
    <div class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <span class="brand-icon">📧</span>
          <span class="brand-text">Email tạm thời iDing</span>
        </div>
        <div id="role-badge" class="role-badge" title="Người dùng hộp thư">Người dùng hộp thư</div>
        <div class="nav-actions">
          <a
            id="repo"
            class="btn btn-ghost"
            href="https://github.com/cong91/freemail-cloudflare"
            target="_blank"
            rel="noopener noreferrer"
            title="Kho mã nguồn mở GitHub"
          >
            <span class="btn-icon">🔗</span>
            <span class="btn-text">GitHub</span>
          </a>
          <button id="logout" class="btn btn-secondary" title="Đăng xuất">
            <span class="btn-icon">🚪</span>
            <span class="btn-text">Đăng xuất</span>
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="container mailbox-container">
      <div class="main mailbox-main">
        <!-- 邮箱信息卡片 -->
        <div class="card mailbox-info-card">
          <h2>
            <span class="card-icon">📬</span>
            Hộp thư của tôi
          </h2>
          <div class="mailbox-info">
            <div class="mailbox-display">
              <span class="mailbox-icon">📧</span>
              <span id="current-mailbox" class="mailbox-address">Đang tải...</span>
              <button
                id="copy-mailbox"
                class="btn btn-secondary btn-sm"
                title="Sao chép địa chỉ email"
              >
                <span class="btn-icon">📋</span>
                <span>Sao chép</span>
              </button>
              <!-- 修改密码 -->
              <button id="change-password" class="btn btn-ghost btn-sm" title="Đổi mật khẩu">
                <span class="btn-icon">🔒</span>
                <span>Đổi mật khẩu</span>
              </button>
            </div>
            <div class="mailbox-toolbar">
              <div class="toolbar-left">
                <span class="chip chip-unread">Chưa đọc <span id="unread-count">0</span></span>
                <span class="chip chip-total">Tất cả <span id="total-count">0</span></span>
              </div>
              <div class="toolbar-right">
                <label class="toggle" title="Sau khi bật sẽ tự động làm mới theo khoảng thời gian">
                  <input id="auto-refresh" type="checkbox" />
                  <span>Tự động làm mới</span>
                </label>
                <select
                  id="refresh-interval"
                  class="select select-sm"
                  title="Khoảng thời gian làm mới"
                >
                  <option value="10">10 giây</option>
                  <option value="30" selected>30 giây</option>
                  <option value="60">60 giây</option>
                </select>
                <input id="search-box" class="input input-sm" placeholder="Tìm người gửi/tiêu đề" />
                <button id="clear-filter" class="btn btn-ghost btn-sm" title="Xóa bộ lọc">
                  Xóa
                </button>
                <button id="refresh-emails" class="btn btn-ghost" title="Làm mới ngay">
                  <span class="btn-icon">🔄</span>
                  <span>Làm mới</span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Hộp thư đến卡片 -->
        <div class="card inbox-card">
          <div class="listcard-header">
            <h2 class="listcard-title">
              <span class="card-icon">📨</span>
              <span>Hộp thư đến</span>
              <span class="retention-hint">Chỉ lưu 24 giờ</span>
            </h2>
            <div
              id="list-loading"
              class="loading-indicator"
              style="pointer-events: none"
              role="status"
              aria-live="polite"
            >
              <div class="spinner"></div>
              <span>Đang tải…</span>
            </div>
          </div>
          <div
            class="list-viewport"
            style="position: relative; contain: layout paint; isolation: isolate"
          >
            <div id="email-list" class="list"></div>
            <div id="empty-state" class="empty-state" style="display: none">
              <div class="empty-icon">📭</div>
              <div class="empty-title">Chưa có email</div>
            </div>
            <div id="list-pager" class="pager" style="display: none">
              <button id="prev-page" class="btn btn-ghost btn-sm">Trang trước</button>
              <span
                id="page-info"
                class="muted"
                style="min-width: 100px; text-align: center"
              ></span>
              <button id="next-page" class="btn btn-ghost btn-sm">Trang sau</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-slot"></div>

    <!-- Hộp thoại chi tiết email -->
    <div class="modal" id="email-modal">
      <div class="modal-card">
        <div class="modal-header">
          <div id="modal-subject">
            <span class="modal-icon">📧</span>
            <span>Chi tiết email</span>
          </div>
          <button id="modal-close" class="close">✕</button>
        </div>
        <div class="modal-body">
          <div id="modal-content"></div>
        </div>
      </div>
    </div>
    <script src="/js/toast-utils.js"></script>
    <script type="module" src="/js/mailbox.js"></script>
    <script>
      // 动态加载公共 footer 模板
      (async function () {
        try {
          const res = await fetch("/templates/footer.html", { cache: "no-cache" });
          const html = await res.text();
          const slot = document.getElementById("footer-slot");
          if (slot) {
            slot.outerHTML = html;
            setTimeout(() => {
              const y = document.getElementById("footer-year");
              if (y) y.textContent = new Date().getFullYear();
            }, 0);
          }
        } catch (_) {}
      })();
    </script>
  </body>
</html>
<!-- Hộp thoại xác nhận xóa -->
<div class="modal" id="confirm-modal">
  <div class="modal-card confirm-card">
    <div class="modal-header confirm-header">
      <div>
        <span class="modal-icon">⚠️</span>
        <span>Xác nhận thao tác</span>
      </div>
      <button id="confirm-close" class="close">✕</button>
    </div>
    <div class="modal-body confirm-body">
      <div id="confirm-message" class="confirm-message"></div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-secondary">Hủy</button>
        <button id="confirm-ok" class="btn btn-danger">Xác nhận</button>
      </div>
    </div>
  </div>
</div>

<!-- Hộp thoại đổi mật khẩu -->
<div class="modal" id="password-modal">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <span class="modal-icon">🔒</span>
        <span>Đổi mật khẩu</span>
      </div>
      <button id="password-close" class="close">✕</button>
    </div>
    <div class="modal-body">
      <div class="password-hint">
        <span class="hint-icon">⚠️</span>
        <span>Sau khi đổi mật khẩu cần đăng nhập lại</span>
      </div>
      <form id="password-form">
        <div class="form-group">
          <label for="current-password">Mật khẩu hiện tại</label>
          <input
            type="password"
            id="current-password"
            class="input"
            placeholder="Vui lòng nhập mật khẩu hiện tại"
            required
          />
        </div>
        <div class="form-group">
          <label for="new-password">Mật khẩu mới</label>
          <input
            type="password"
            id="new-password"
            class="input"
            placeholder="Vui lòng nhập mật khẩu mới (ít nhất 6 ký tự)"
            minlength="6"
            required
          />
        </div>
        <div class="form-group">
          <label for="confirm-password">Xác nhận mật khẩu mới</label>
          <input
            type="password"
            id="confirm-password"
            class="input"
            placeholder="Vui lòng nhập lại mật khẩu mới"
            minlength="6"
            required
          />
        </div>
        <div class="form-actions">
          <button type="button" id="password-cancel" class="btn btn-secondary">Hủy</button>
          <button type="submit" id="password-submit" class="btn btn-primary">Đổi mật khẩu</button>
        </div>
      </form>
    </div>
  </div>
</div>
